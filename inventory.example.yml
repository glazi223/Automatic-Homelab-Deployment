# inventory.yml
all:
  vars:
    gateway: "192.168.1.1"           # Usually this but can be found from the terminal with ipconfig (windows) ip route (linux)
    system_timezone: "TIMEZONE" # Set your timezone
    
    # --- 1. PROXMOX SERVER ---
    # ========================================================================
    # ⚠️ WARNING: STATIC IP ADDRESSES & DHCP
    # ========================================================================
    # Do NOT just use the default IPs below! You must choose IPs that match 
    # your home network's subnet (e.g., 192.168.1.x or 10.0.0.x).
    # 
    # CRITICAL: Make sure the IPs you choose are OUTSIDE your router's 
    # DHCP range to prevent IP conflicts and network crashes. 
    # 👉 See Section 2 in the README for a guide on finding free IPs.
    # ========================================================================
    
    # 💡 TIP: If your router is 192.168.1.1, IPs like .150, .151, .152 
    # are usually free and safe to use. No need to scan your network! 
    proxmox_host: "192.168.1.150" # Choose an open local ip 
    proxmox_node: "pve"       # How you named your proxmox on setup          
    api_user: "root@pam"          # Can be left as is
    api_password: "PASSWORD"      # Choose a password 
    
    # 🔑 API KEYS (Auto-generated by Ansible)
    # You don't need to touch these. Ansible will automatically generate and save securely in WSL Linux home directory.
    radarr_api_key: "{{ lookup('password', '~/homelab_secrets/radarr_api_key.txt chars=ascii_lowercase,digits length=32') }}"
    sonarr_api_key: "{{ lookup('password', '~/homelab_secrets/sonarr_api_key.txt chars=ascii_lowercase,digits length=32') }}"
    jackett_api_key: "{{ lookup('password', '~/homelab_secrets/jackett_api_key.txt chars=ascii_lowercase,digits length=32') }}"

    # --- 2. ANSIBLE & SSH ---
    ansible_user: "root"
    ansible_ssh_pass: "PASSWORD"  # Choose a password 
    ansible_ssh_extra_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

    # --- 3. CLOUDFLARE & PLAYIT TUNNELS ---
    #See Section 4 of README for more info
    domain_name: "DOMAIN"      # Your bought domain
    tunnel_token: "TUNNEL_TOKEN"     # Token got upon tunnel creation in Cloudflare  
    tunnel_id: "TUNNEL_ID"              # ID gotten after tunnel creation from the dashboard
    cloudflare_account_id: "ACCOUNT_ID" # ID got from the main dashboard of cloudflare
    cloudflare_api_token: "API_TOKEN"   # Token got from the profile/API section of cloudflare
    cloudflare_zone_id: "ZONE_ID"       # ID got from the main dashboard of cloudflare

    # --- 4. NEXTCLOUD SETUP ---
    nextcloud_admin_user: "admin"       # Can be changed to your name or left as is
    nextcloud_admin_pass: "PASSWORD"    # Another password of your choosing
    
    # --- 5. PASSWORDS (DATABASE & ADMIN) ---
    db_password: "PASSWORD"     # Another password
    admin_user: "admin"         # Can be changed to your name or left as is
    admin_password: "PASSWORD"  # Another password

    # --- 6. MINECRAFT SERVER---
    playit_secret_key: "SECRET_KEY" # Key gotten from playit.gg see section 1.2 of README

  # =======================================================
  # ⚠️ WARNING: RAM ALLOCATION
  # =======================================================
  # Do NOT just put all your RAM into the LXCs and VMs.The 
  # total of the RAM allocated for the VMs and LXCs should leave at 
  # least of 2.5GB free RAM for the hypervisor.
  # =======================================================
  children:
    proxmox:
      hosts:
        server_pc:
          ansible_host: "192.168.1.150"  # Chosen IP as stated before or in section 2 of README

    lxc_containers:
      hosts:
        nextcloud_ct:
          ansible_host: "192.168.1.151" # Chosen IP as stated before or in section 2 of README
          vmid: 100
          hostname: "nextcloud"
          memory: 1024 # Optimal size
          cores: 2

        adguard_ct:
          ansible_host: "192.168.1.152" # Chosen IP as stated before or in section 2 of README
          vmid: 102
          hostname: "adguard"
          memory: 512  # Optimal size
          cores: 1
      
    virtual_machines:  
      hosts:
        media_vm:
          ansible_host: "192.168.1.153" # Chosen IP as stated before or in section 2 of README
          vmid: 101
          hostname: "media-server"
          memory: 6144 # Can be higher for higher usage or more transcoding
          cores: 2

        minecraft_vm:
          ansible_host: "192.168.1.154" # Chosen IP as stated before or in section 2 of README
          vmid: 103
          hostname: "minecraft"
          memory: 6144 # For minecraft minimum shouldnt be lowered. Can be hightened for more players.
          cores: 4
